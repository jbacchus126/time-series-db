---
# Test suite for mockFetch function
test_setup:
  name: "MockFetch Function Tests"
  description: "Comprehensive tests for mockFetch synthetic data generation."

  index_configs:
    - name: "test_index"
      shards: 1
      replicas: 0

test_case:
  name: "MockFetch Tests"

  input_data_list:
    - index_name: "test_index"
      input_data_type: FIXED_INTERVAL
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:01:00Z"
        step: "1m"
      regular_metrics:
        # Dummy metric - required by test framework but not used by mockFetch
        - labels: "name:dummy"
          values: [0]

  queries:
    # Basic functionality tests
    - name: "mockFetch_single_value"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch 42.5"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:01:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "mockFetch"}
            values: [42.5]

    - name: "mockFetch_five_values"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch 1,2,3,4,5"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:05:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "mockFetch"}
            values: [1, 2, 3, 4, 5]

    # Tag tests
    - name: "mockFetch_with_single_tag"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch 10,20,30 name:test_series"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:03:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "test_series"}
            values: [10, 20, 30]

    - name: "mockFetch_with_multiple_tags"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch 10,20,30 name:test_series dc:dca1 env:prod"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:03:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "test_series", dc: "dca1", env: "prod"}
            values: [10, 20, 30]

    # Decimal and negative value tests
    - name: "mockFetch_decimal_values"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch 1.5,2.5,3.5,4.5"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:04:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "mockFetch"}
            values: [1.5, 2.5, 3.5, 4.5]

    - name: "mockFetch_mixed_positive_negative_decimals"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch -2.5,5.0,12.5,-6.5 name:temperature"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:04:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "temperature"}
            values: [-2.5, 5.0, 12.5, -6.5]

    # Pipeline operation tests
    - name: "mockFetch_with_scale"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch 5,10,15,20 name:base | scale 2"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:04:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "base"}
            values: [10, 20, 30, 40]

    - name: "mockFetch_with_alias"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch 100,200,300 name:metric region:us-west | alias MyTestSeries"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:03:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "metric", region: "us-west"}
            alias: "MyTestSeries"
            values: [100, 200, 300]

    - name: "mockFetch_with_transformNull"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch 1,2,3,nan,5 name:data | transformNull 0"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:04:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "data"}
            values: [1, 2, 3, 0, 5]
    - name: "mockFetch_with_Nan_values"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch 1,NaN,3,nan,5 name:data nan:test NaN:another"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:04:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "data", nan: "test", NaN: "another"}
            values: [1, null, 3, null, 5]
    - name: "mockFetch_with_Nan_values_and_tag"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch 1,2,3,Nan,5 name:data nan:test NaN:another | transformNull 0"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:04:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "data", nan: "test", NaN: "another"}
            values: [1, 2, 3, 0, 5]

    # Multiple mockFetch tests
    - name: "mockFetch_union_two_series"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch 1,2,3 name:series1 | mockFetch 4,5,6 name:series2"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:03:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "series1"}
            values: [1, 2, 3]
          - metric: {name: "series2"}
            values: [4, 5, 6]

    - name: "mockFetch_with_sum_aggregation"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch 1,2,3 name:series1 | mockFetch 4,5,6 name:series2 | sum"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:03:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {}
            values: [5, 7, 9]

    # Single series aggregation
    - name: "mockFetch_single_series_sum"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch 1,2,3 | sum"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:03:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {}
            values: [1, 2, 3]

    # Different step sizes
    - name: "mockFetch_large_step_size"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch 1,2,3,4 name:coarse"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:30:00Z"
        step: "10m"
      expected:
        status: "success"
        data:
          - metric: {name: "coarse"}
            values: [1, 2, 3, 4]

    # Zero values
    - name: "mockFetch_with_zeros"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetch 0,1,0,2,0"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:05:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "mockFetch"}
            values: [0, 1, 0, 2, 0]

    # MockFetchLine tests - horizontal line (constant value)
    - name: "mockFetchLine_basic_positive"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLine 10"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:05:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "mockFetchLine"}
            values: [10, 10, 10, 10, 10]

    - name: "mockFetchLine_with_tag"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLine 42.5 name:constant_line region:us-east"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:04:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "constant_line", region: "us-east"}
            values: [42.5, 42.5, 42.5, 42.5]

    - name: "mockFetchLine_negative_value"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLine -5.5 name:negative_line"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:03:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "negative_line"}
            values: [-5.5, -5.5, -5.5]

    - name: "mockFetchLine_with_scale"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLine 5 name:base | scale 3"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:03:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "base"}
            values: [15, 15, 15]

    - name: "mockFetchLine_union_two_lines"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLine 10 name:line1 | mockFetchLine 20 name:line2"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:03:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "line1"}
            values: [10, 10, 10]
          - metric: {name: "line2"}
            values: [20, 20, 20]
    - name: "mockFetchLinear_ascending"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLinear 5 10 1"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:05:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "mockFetchLinear"}
            values: [5, 6, 7, 8, 9, 10]

    - name: "mockFetchLinear_tag"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLinear 7 16 2 tag1:mockFetchLinearTest env:staging"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:04:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {tag1: "mockFetchLinearTest", env: "staging"}
            values: [7, 9, 11, 13, 15]

    - name: "mockFetchLinear_descending"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLinear 100 50 -25 name:descending"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:06:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "descending"}
            values: [100,75,50]

    - name: "mockFetchLinear_cross_zero"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLinear -3 3 2 name:cross_zero"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:04:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "cross_zero"}
            values: [-3, -1, 1, 3]

    - name: "mockFetchLinear_stepSize_with_decimal"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLinear 10 12 0.5 name:decimal_step"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:05:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "decimal_step"}
            values: [10.0, 10.5, 11.0, 11.5, 12.0]

    - name: "mockFetchLinear_with_scale"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLinear 0 4 1 name:base | scale 10"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:05:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "base"}
            values: [0, 10, 20, 30, 40]
    - name: "mockFetchLinear_step_larger_than_max"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLinear 1 2 10 name:base"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:05:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "base"}
            values: [1]

    - name: "mockFetchLinear_union_two_series"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLinear 0 2 1 name:series1 | mockFetchLinear 10 14 2 name:series2"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:03:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {name: "series1"}
            values: [0, 1, 2]
          - metric: {name: "series2"}
            values: [10, 12, 14]

    - name: "mockFetchLinear_with_sum"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLinear 0 3 1 name:a | mockFetchLinear 10 16 2 name:b | sum"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:04:00Z"
        step: "1m"
      expected:
        status: "success"
        data:
          - metric: {}
            values: [10, 13, 16, 19]

    # MockFetchLinear validation tests
    - name: "mockFetchLinear_invalid_positive_range_negative_step"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLinear -1 20 -2"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:05:00Z"
        step: "1m"
      expected:
        status: "failure"
        error_message: "Query execution failed: status=400, error={\"error\":\"Step size must be positive if end is greater than start\"}"

    - name: "mockFetchLinear_invalid_negative_range_positive_step"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLinear 15 3 2"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:05:00Z"
        step: "1m"
      expected:
        status: "failure"
        error_message: "Query execution failed: status=400, error={\"error\":\"Step size must be negative if start is greater than end\"}"

    - name: "mockFetchLinear_zero_stepSize"
      type: "m3ql"
      indices: "test_index"
      query: "mockFetchLinear 0 10 0"
      time_config:
        min_timestamp: "2025-01-01T00:00:00Z"
        max_timestamp: "2025-01-01T00:05:00Z"
        step: "1m"
      expected:
        status: "failure"
        error_message: "Query execution failed: status=400, error={\"error\":\"MockFetchLinear requires non-zero stepSize\"}"
